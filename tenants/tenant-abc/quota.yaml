apiVersion: v1
kind: ResourceQuota
metadata:
  name: tenant-abc-quota
  namespace: tenant-abc
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "1"
    limits.memory: "1Gi"
    pods: "10"
    services: "10"
    persistentvolumeclaims: "0"

---
apiVersion: v1
kind: LimitRange
metadata:
  name: tenant-abc-default-limits
  namespace: tenant-abc
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      default:
        cpu: "250m"
        memory: "256Mi"