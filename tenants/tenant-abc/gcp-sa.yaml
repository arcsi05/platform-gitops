# 1. Create the GCP Service Account
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  name: tenant-abc-sa
spec:
  forProvider:
    displayName: "tenant-abc bucket access SA"
    description: "Managed by Crossplane for tenant-abc"
  providerConfigRef:
    name: default

---
# 2. Generate a key and write it into tenant-abc namespace
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccountKey
metadata:
  name: tenant-abc-sa-key
spec:
  forProvider:
    serviceAccountIdRef:
      name: tenant-abc-sa
  writeConnectionSecretToRef:
    name: tenant-abc-gcp-sa       # pod mounts this by name
    namespace: tenant-abc         # ← written directly here, no copy needed
  providerConfigRef:
    name: default

---
# 3. Grant the SA objectViewer on the bucket only
apiVersion: storage.gcp.upbound.io/v1beta1
kind: BucketIAMMember
metadata:
  name: tenant-abc-sa-bucket-access
spec:
  forProvider:
    bucketRef:
      name: tenant-abc-bucket-testdemo4234
    role: roles/storage.objectViewer
    member: serviceAccount:tenant-abc-sa@kubernetes-object-store.iam.gserviceaccount.com
  providerConfigRef:
    name: default