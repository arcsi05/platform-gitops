apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  name: {{ .Values.tenantName }}-app-sa
spec:
  forProvider:
    displayName: "{{ .Values.tenantName }} bucket access SA"
  providerConfigRef:
    name: default

---
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccountKey
metadata:
  name: {{ .Values.tenantName }}-sa-key
spec:
  forProvider:
    serviceAccountIdRef:
      name: {{ .Values.tenantName }}-app-sa
  writeConnectionSecretToRef:
    name: {{ .Values.tenantName }}-gcp-sa
    namespace: {{ .Values.tenantName }}
  providerConfigRef:
    name: default

---
apiVersion: storage.gcp.upbound.io/v1beta1
kind: BucketIAMMember
metadata:
  name: {{ .Values.tenantName }}-sa-bucket-access
spec:
  forProvider:
    bucketRef:
      name: {{ .Values.bucketName }}
    role: roles/storage.objectUser
    member: serviceAccount:{{ .Values.tenantName }}-app-sa@{{ .Values.gcpProject }}.iam.gserviceaccount.com
  providerConfigRef:
    name: default

---
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ServiceAccount
metadata:
  name: {{ .Values.tenantName }}-gar-sa
spec:
  forProvider:
    displayName: "{{ .Values.tenantName }} GAR access SA"
  providerConfigRef:
    name: default

---
apiVersion: cloudplatform.gcp.upbound.io/v1beta1
kind: ProjectIAMMember
metadata:
  name: {{ .Values.tenantName }}-sa-gar-reader
spec:
  forProvider:
    project: {{ .Values.gcpProject }}
    role: roles/artifactregistry.reader
    member: serviceAccount:{{ .Values.tenantName }}-gar-sa@{{ .Values.gcpProject }}.iam.gserviceaccount.com
  providerConfigRef:
    name: default