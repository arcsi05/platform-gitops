apiVersion: storage.gcp.upbound.io/v1beta1
kind: Bucket
metadata:
  name: {{ .Values.bucketName }}
spec:
  forProvider:
    location: {{ .Values.bucketLocation }}
    storageClass: STANDARD
    uniformBucketLevelAccess: true
    versioning:
      - enabled: false
  providerConfigRef:
    name: default