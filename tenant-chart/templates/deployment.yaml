apiVersion: apps/v1
kind: Deployment
metadata:
  name: bucket-api
  namespace: {{ .Values.tenantName }}
  labels:
    app: bucket-api
    tenant: {{ .Values.tenantName }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: bucket-api
      tenant: {{ .Values.tenantName }}
  template:
    metadata:
      labels:
        app: bucket-api
        tenant: {{ .Values.tenantName }}
    spec:
      serviceAccountName: {{ .Values.tenantName }}-app
      automountServiceAccountToken: false
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GCP_PROJECT
              value: {{ .Values.gcpProject }}
            - name: BUCKET_NAME
              value: {{ .Values.bucketName }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/run/gcp/creds.json"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: gcp-creds
              mountPath: /var/run/gcp
              readOnly: true
      volumes:
        - name: gcp-creds
          secret:
            secretName: {{ .Values.tenantName }}-gcp-sa
            items:
              - key: private_key
                path: creds.json