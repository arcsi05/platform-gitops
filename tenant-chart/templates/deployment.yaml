apiVersion: apps/v1
kind: Deployment
metadata:
  name: bucket-api
  namespace: {{ .Values.tenantName }}
  labels:
    app: bucket-api
    tenant: {{ .Values.tenantName }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: bucket-api
      tenant: {{ .Values.tenantName }}
  template:
    metadata:
      labels:
        app: bucket-api
        tenant: {{ .Values.tenantName }}
    spec:
      serviceAccountName: {{ .Values.tenantName }}-app   # ← uses our SA with imagePullSecrets
      automountServiceAccountToken: false
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: GCP_SA_EMAIL
              value: {{ .Values.gcpServiceAccountEmail }}
            - name: GCP_PROJECT
              value: {{ .Values.gcpProject }}
            - name: BUCKET_NAME
              value: {{ .Values.bucketName }}
            - name: GCP_TOKEN_URI
              value: "https://oauth2.googleapis.com/token"
            - name: GCP_PRIVATE_KEY_PATH
              value: "/var/run/gcp/private_key.pem"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | quote }}
              memory: {{ .Values.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory | quote }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: gcp-key
          secret:
            secretName: {{ .Values.tenantName }}-gcp-sa
            items:
              - key: private_key
                path: private_key.pem
      volumeMounts:
        - name: gcp-key
          mountPath: /var/run/gcp
          readOnly: true